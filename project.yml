name: Kytos
options:
  bundleIdPrefix: me.jwintz
  deploymentTarget:
    macOS: 26.0
    iOS: 26.0
settings:
  DEVELOPMENT_TEAM: H4T77W7K9A
  CODE_SIGN_STYLE: Automatic
  SWIFT_VERSION: "5"
packages:
  Kelyphos:
    path: ../kelyphos
  SwiftTerm:
    path: Submodules/SwiftTerm
  ios_system:
    url: https://github.com/holzschu/ios_system.git
    from: 3.0.4
  # network_ios deferred — upstream checksum mismatch (v0.3.0 references v0.2 binary with wrong hash)
  # network_ios:
  #   url: https://github.com/holzschu/network_ios.git
  #   from: 0.2.0

targets:
  Kytos-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/KytosApp
      - path: Sources/KytosWidget/KytosWidgetSnapshot.swift
      - path: Kytos-Default.icns
        buildPhase: resources
      - path: Kytos-Default.icon
        buildPhase: resources
    dependencies:
      - package: Kelyphos
        product: KelyphosKit
      - package: SwiftTerm
        product: SwiftTerm
      - target: Kytos-Widget-macOS
        embed: true
        codeSign: true
    preBuildScripts:
      - name: Apply Pane Patches
        script: |
          "${SRCROOT}/Scripts/apply-pane-patches.sh"
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Bundle pane
        basedOnDependencyAnalysis: false
        script: |
          set -e
          export PATH="/usr/bin:/bin:/usr/local/bin:$PATH"
          cd "${SRCROOT}/Submodules/Pane"
          swift build -c debug 2>&1 | tail -3
          PANE_BIN="${SRCROOT}/Submodules/Pane/.build/debug/pane"
          if [ ! -f "$PANE_BIN" ]; then
            PANE_BIN=$(find "${BUILD_DIR}" -name "pane" -type f -perm +0111 2>/dev/null | grep -v "\.dSYM\|[Dd]ebug-iphonesimulator" | sort | tail -1)
          fi
          if [ -n "$PANE_BIN" ]; then
            mkdir -p "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}"
            cp "$PANE_BIN" "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/pane"
            codesign --force --sign - "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/pane"
          fi
      - name: Register widget
        basedOnDependencyAnalysis: false
        script: |
          LSREGISTER="/System/Library/Frameworks/CoreServices.framework/Versions/A/Frameworks/LaunchServices.framework/Versions/A/Support/lsregister"
          "$LSREGISTER" -f "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app" 2>/dev/null || true
          pluginkit -a "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/PlugIns/KytosWidget.appex" 2>/dev/null || true

    info:
      path: Sources/KytosApp/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        NSPrincipalClass: NSApplication
        CFBundleName: Kytos
        CFBundleDisplayName: Kytos
        CFBundleIconFile: Kytos-Default
        CFBundleIconName: Kytos-Default
    settings:
      PRODUCT_NAME: Kytos
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
    entitlements:
      path: Sources/KytosApp/Kytos.entitlements

  Kytos-Widget-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/KytosWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: Sources/KytosWidget/Info.plist
      properties:
        CFBundleName: KytosWidget
        CFBundleDisplayName: Kytos Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      PRODUCT_NAME: KytosWidget
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos.KytosWidget
      SKIP_INSTALL: YES
      ENABLE_APP_SANDBOX: YES
      APPLICATION_EXTENSION_API_ONLY: YES
      DEAD_CODE_STRIPPING: NO
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: Sources/KytosWidget/KytosWidget.entitlements

  Kytos-Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/KytosTests
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      PRODUCT_NAME: KytosTests
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.KytosTests
      GENERATE_INFOPLIST_FILE: YES

  Kytos-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/KytosApp
      - path: Sources/KytosWidget/KytosWidgetSnapshot.swift
    dependencies:
      - package: Kelyphos
        product: KelyphosKit
      - package: SwiftTerm
        product: SwiftTerm
      - target: Kytos-Widget-iOS
        embed: true
        codeSign: true
      - package: ios_system
        product: ios_system
    info:
      path: Sources/KytosApp/Info.plist
      properties:
        UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        CFBundleName: Kytos
        CFBundleDisplayName: Kytos
    settings:
      PRODUCT_NAME: Kytos
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/KytosApp/Kytos-iOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.jwintz.Syntropment

  Kytos-Widget-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/KytosWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: Sources/KytosWidget/Info.plist
      properties:
        CFBundleName: KytosWidget
        CFBundleDisplayName: Kytos Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      PRODUCT_NAME: KytosWidget
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos.KytosWidget
      SKIP_INSTALL: YES
      ENABLE_APP_SANDBOX: YES
      APPLICATION_EXTENSION_API_ONLY: YES
      DEAD_CODE_STRIPPING: NO
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: Sources/KytosWidget/KytosWidget-iOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.me.jwintz.Syntropment

schemes:
  Kytos-macOS:
    build:
      targets:
        Kytos-macOS: all
        Kytos-Widget-macOS: all
    run:
      config: Debug
  Kytos-iOS:
    build:
      targets:
        Kytos-iOS: all
        Kytos-Widget-iOS: all
    run:
      config: Debug
  Kytos-Tests:
    build:
      targets:
        Kytos-Tests: all
    run:
      config: Debug
