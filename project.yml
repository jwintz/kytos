name: Kytos
options:
  bundleIdPrefix: me.jwintz
  deploymentTarget:
    macOS: 26.0
    iOS: 26.0
settings:
  DEVELOPMENT_TEAM: H4T77W7K9A
  CODE_SIGN_STYLE: Automatic
packages:
  Kelyphos:
    path: ../kelyphos
  pane:
    path: Submodules/Pane
  SwiftTerm:
    path: Submodules/SwiftTerm

targets:
  Kytos-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/KytosApp
      - path: Sources/KytosWidget/KytosWidgetSnapshot.swift
      - path: Kytos-Default.icns
        buildPhase: resources
    dependencies:
      - package: Kelyphos
        product: KelyphosKit
      - package: pane
        product: pane
      - package: SwiftTerm
        product: SwiftTerm
      - target: Kytos-Widget-macOS
        embed: true
        codeSign: true
    preBuildScripts:
      - name: Apply Pane Patches
        script: |
          "${SRCROOT}/Scripts/apply-pane-patches.sh"
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: Build mksh
        script: |
          cd ${SRCROOT}/Submodules/mksh
          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS=""
          export CC="clang"
          sh Build.sh -r
          mkdir -p ${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}
          cp mksh ${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/mksh_bin
          codesign --force --sign - ${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/mksh_bin
      - name: Bundle pane
        script: |
          set -e
          export PATH="/usr/bin:/bin:/usr/local/bin:$PATH"
          cd "${SRCROOT}/Submodules/Pane"
          swift build -c debug 2>&1 | tail -3
          PANE_BIN="${SRCROOT}/Submodules/Pane/.build/debug/pane"
          if [ ! -f "$PANE_BIN" ]; then
            PANE_BIN=$(find "${BUILD_DIR}" -name "pane" -type f -perm +0111 2>/dev/null | grep -v "\.dSYM\|[Dd]ebug-iphonesimulator" | sort | tail -1)
          fi
          if [ -n "$PANE_BIN" ]; then
            mkdir -p "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}"
            cp "$PANE_BIN" "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/pane"
            codesign --force --sign - "${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/pane"
          fi

    info:
      path: Sources/KytosApp/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        NSPrincipalClass: NSApplication
        CFBundleName: Kytos
        CFBundleDisplayName: Kytos
        CFBundleIconFile: Kytos-Default
        CFBundleIconName: Kytos-Default
    settings:
      PRODUCT_NAME: Kytos
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos
      ASSETCATALOG_COMPILER_APPICON_NAME: ""
    entitlements:
      path: Sources/KytosApp/Kytos.entitlements

  Kytos-Widget-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/KytosWidget
    info:
      path: Sources/KytosWidget/Info.plist
      properties:
        CFBundleName: KytosWidget
        CFBundleDisplayName: Kytos Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      PRODUCT_NAME: KytosWidget
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos.KytosWidget
      SKIP_INSTALL: YES
      ENABLE_APP_SANDBOX: YES
    entitlements:
      path: Sources/KytosWidget/KytosWidget.entitlements

  Kytos-Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/KytosTests
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      PRODUCT_NAME: KytosTests
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.KytosTests
      GENERATE_INFOPLIST_FILE: YES

  Kytos-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/KytosApp
      - path: Sources/KytosWidget/KytosWidgetSnapshot.swift
    dependencies:
      - package: Kelyphos
        product: KelyphosKit
      - package: SwiftTerm
        product: SwiftTerm
      - target: Kytos-Widget-iOS
        embed: true
        codeSign: true
    postBuildScripts:
      - name: Build mksh
        script: |
          cd ${SRCROOT}/Submodules/mksh
          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS=""
          export CC="clang"
          sh Build.sh -r
          mkdir -p ${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}
          cp mksh ${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/mksh_bin
          codesign --force --sign - ${TARGET_BUILD_DIR}/${EXECUTABLE_FOLDER_PATH}/mksh_bin
    info:
      path: Sources/KytosApp/Info.plist
      properties:
        UIApplicationSupportsMultipleScenes: true
        UILaunchScreen: {}
        CFBundleName: Kytos
        CFBundleDisplayName: Kytos
    settings:
      PRODUCT_NAME: Kytos
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/KytosApp/Kytos.entitlements

  Kytos-Widget-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/KytosWidget
    info:
      path: Sources/KytosWidget/Info.plist
      properties:
        CFBundleName: KytosWidget
        CFBundleDisplayName: Kytos Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      PRODUCT_NAME: KytosWidget
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos.KytosWidget
      SKIP_INSTALL: YES
      ENABLE_APP_SANDBOX: YES
    entitlements:
      path: Sources/KytosWidget/KytosWidget.entitlements

