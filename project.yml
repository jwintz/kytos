name: Kytos
options:
  bundleIdPrefix: me.jwintz
  deploymentTarget:
    macOS: 26.0
settings:
  DEVELOPMENT_TEAM: H4T77W7K9A
  CODE_SIGN_STYLE: Automatic
  SWIFT_VERSION: "6"
packages:
  Kelyphos:
    path: ../kelyphos

targets:
  Kytos-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/KytosApp
      - path: Sources/KytosWidget/KytosWidgetSnapshot.swift
      - path: kytos.icns
        buildPhase: resources
    dependencies:
      - package: Kelyphos
        product: KelyphosKit
      - framework: Frameworks/GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - target: Kytos-Widget-macOS
        embed: true
        codeSign: true
    postBuildScripts:
      - name: Register widget
        basedOnDependencyAnalysis: false
        script: |
          LSREGISTER="/System/Library/Frameworks/CoreServices.framework/Versions/A/Frameworks/LaunchServices.framework/Versions/A/Support/lsregister"
          "$LSREGISTER" -f "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app" 2>/dev/null || true
          pluginkit -a "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/PlugIns/KytosWidget.appex" 2>/dev/null || true

    info:
      path: Sources/KytosApp/Info.plist
      properties:
        LSApplicationCategoryType: public.app-category.utilities
        NSPrincipalClass: NSApplication
        CFBundleName: Kytos
        CFBundleDisplayName: Kytos
        CFBundleIconFile: kytos
        UTExportedTypeDeclarations:
          - UTTypeConformsTo:
              - public.data
            UTTypeDescription: Kytos Pane ID
            UTTypeIdentifier: me.jwintz.kytos.pane-id
            UTTypeTagSpecification: {}
    settings:
      PRODUCT_NAME: Kytos
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos
      OTHER_LDFLAGS: "-lc++"
    entitlements:
      path: Sources/KytosApp/Kytos.entitlements

  Kytos-Widget-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/KytosWidget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    info:
      path: Sources/KytosWidget/Info.plist
      properties:
        CFBundleName: KytosWidget
        CFBundleDisplayName: Kytos Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      PRODUCT_NAME: KytosWidget
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.Kytos.KytosWidget
      SKIP_INSTALL: YES
      ENABLE_APP_SANDBOX: YES
      APPLICATION_EXTENSION_API_ONLY: YES
      DEAD_CODE_STRIPPING: NO
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: Sources/KytosWidget/KytosWidget.entitlements

  Kytos-Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/KytosTests
    dependencies:
      - framework: Frameworks/GhosttyKit.xcframework
    settings:
      PRODUCT_NAME: KytosTests
      PRODUCT_BUNDLE_IDENTIFIER: me.jwintz.KytosTests
      GENERATE_INFOPLIST_FILE: YES

schemes:
  Kytos-macOS:
    build:
      targets:
        Kytos-macOS: all
        Kytos-Widget-macOS: all
    run:
      config: Debug
  Kytos-Tests:
    build:
      targets:
        Kytos-Tests: all
    run:
      config: Debug
