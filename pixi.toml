[workspace]
name = "kytos"
version = "0.1.0"
description = "A terminal emulator for macOS and iPadOS"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64"]

[tasks]
# Force-regenerate the Xcode project from project.yml (always runs XcodeGen).
generate = "swift run xcodegen generate --spec project.yml"

# Regenerate only when project.yml is newer than the generated project.pbxproj.
# Use `pixi run generate` to force-regenerate unconditionally.
generate-if-needed = "bash -c 'test Kytos.xcodeproj/project.pbxproj -nt project.yml || swift run xcodegen generate --spec project.yml'"

build = { cmd = "xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug build -allowProvisioningUpdates", depends-on = ["generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX26.2.sdk" } }
# Run unit tests (scrollback logic + ANSI encoding).
test = { cmd = "bash Scripts/run-tests.sh", depends-on = ["generate-if-needed"] }
# Launch via LaunchServices so the dock icon and widget extension are properly registered.
# lsregister + pluginkit ensure the widget appears in System Settings on first run.
# `open -W` waits for the app to exit (keeps the task foreground).
run = { cmd = "bash -c 'BUILT=$(xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); /System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -f \"$BUILT/Kytos.app\"; pluginkit -a \"$BUILT/Kytos.app/Contents/PlugIns/KytosWidget.appex\"; open -W \"$BUILT/Kytos.app\"'", depends-on = ["build"] }
