[workspace]
name = "kytos"
version = "0.1.0"
description = "A terminal emulator for macOS"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64"]

[dependencies]
zig = ">=0.13"
gettext = ">=0.22"

[tasks]
# Build GhosttyKit.xcframework from Ghostty source.
build-ghostty = { cmd = "bash -c 'set -e; cd /Users/jwintz/Syntropment/ghostty && zig build -Doptimize=ReleaseFast -Demit-xcframework -Dxcframework-target=native && mkdir -p \"$PIXI_PROJECT_ROOT/Frameworks\" && rm -rf \"$PIXI_PROJECT_ROOT/Frameworks/GhosttyKit.xcframework\" && cp -R macos/GhosttyKit.xcframework \"$PIXI_PROJECT_ROOT/Frameworks/\" && mkdir -p \"$PIXI_PROJECT_ROOT/Resources/ghostty\" && cp -R zig-out/share/ghostty/shell-integration \"$PIXI_PROJECT_ROOT/Resources/ghostty/\" && cp -R zig-out/share/terminfo \"$PIXI_PROJECT_ROOT/Resources/\"'", description = "Build GhosttyKit.xcframework and copy shell integration resources" }

# Ensure GhosttyKit.xcframework exists (build only if missing).
ensure-ghostty = { cmd = "bash -c 'if [ -d \"$PIXI_PROJECT_ROOT/Frameworks/GhosttyKit.xcframework\" ]; then echo \"GhosttyKit.xcframework present.\"; else echo \"GhosttyKit.xcframework missing, building...\"; cd /Users/jwintz/Syntropment/ghostty && zig build -Doptimize=ReleaseFast -Demit-xcframework -Dxcframework-target=native && mkdir -p \"$PIXI_PROJECT_ROOT/Frameworks\" && cp -R macos/GhosttyKit.xcframework \"$PIXI_PROJECT_ROOT/Frameworks/\"; fi'", description = "Ensure GhosttyKit.xcframework exists" }

# Force-regenerate the Xcode project from project.yml (always runs XcodeGen).
generate = "swift run xcodegen generate --spec project.yml"

# Regenerate only when project.yml is newer than the generated project.pbxproj.
# Use `pixi run generate` to force-regenerate unconditionally.
generate-if-needed = "bash -c 'test Kytos.xcodeproj/project.pbxproj -nt project.yml || swift run xcodegen generate --spec project.yml'"

# Always build (use for forced rebuild).
# NOTE: depends on ensure-ghostty (not build-ghostty) to work around
# Zig linker bug on macOS 26 + Xcode 26.4 SDK (codeberg.org/ziglang/zig/issues/31669).
# Use `pixi run build-ghostty` explicitly to rebuild GhosttyKit when the Zig fix lands.
build = { cmd = "bash -c 'BUILD_VERSION=$(date +%s); xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug build -allowProvisioningUpdates CURRENT_PROJECT_VERSION=\"$BUILD_VERSION\"'", depends-on = ["ensure-ghostty", "generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }
# Build only when sources, project, or submodules are newer than the built binary.
build-if-needed = { cmd = "bash -c 'BUILT=$(xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); BIN=\"$BUILT/Kytos.app/Contents/MacOS/Kytos\"; if [ -f \"$BIN\" ] && [ -z \"$(find Sources Frameworks project.yml Kytos.xcodeproj/project.pbxproj -newer \"$BIN\" 2>/dev/null | head -1)\" ]; then echo \"Build up to date.\"; else BUILD_VERSION=$(date +%s); xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug build -allowProvisioningUpdates CURRENT_PROJECT_VERSION=\"$BUILD_VERSION\"; fi'", depends-on = ["ensure-ghostty", "generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }
# Run unit tests.
test = { cmd = "bash Scripts/run-tests.sh", depends-on = ["generate-if-needed"] }

# Remove all build artifacts, derived data, and generated project for a pristine rebuild.
distclean = "rm -rf .build Kytos.xcodeproj DerivedData build && xcodebuild -alltargets clean 2>/dev/null; echo 'distclean complete'"

# Build if needed, register widget, launch app.
run = { cmd = "bash -c 'BUILT=$(xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); LSREGISTER=\"/System/Library/Frameworks/CoreServices.framework/Versions/A/Frameworks/LaunchServices.framework/Versions/A/Support/lsregister\"; \"$LSREGISTER\" -f \"$BUILT/Kytos.app\" 2>/dev/null || true; WIDGET=\"$BUILT/Kytos.app/Contents/PlugIns/KytosWidget.appex\"; if [ -d \"$WIDGET\" ]; then pluginkit -r \"$WIDGET\" 2>/dev/null || true; pluginkit -a \"$WIDGET\" 2>/dev/null || true; fi; open -W \"$BUILT/Kytos.app\"'", depends-on = ["build-if-needed"] }

# Build Release, register widget, launch app.
run-release = { cmd = "bash -c 'BUILT=$(xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Release -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); LSREGISTER=\"/System/Library/Frameworks/CoreServices.framework/Versions/A/Frameworks/LaunchServices.framework/Versions/A/Support/lsregister\"; \"$LSREGISTER\" -f \"$BUILT/Kytos.app\" 2>/dev/null || true; WIDGET=\"$BUILT/Kytos.app/Contents/PlugIns/KytosWidget.appex\"; if [ -d \"$WIDGET\" ]; then pluginkit -r \"$WIDGET\" 2>/dev/null || true; pluginkit -a \"$WIDGET\" 2>/dev/null || true; fi; open -W \"$BUILT/Kytos.app\"'", depends-on = ["build-release-if-needed"] }

# -- Release packaging tasks --

# Build Release configuration via xcodebuild.
# NOTE: depends on ensure-ghostty (not build-ghostty) to work around
# Zig linker bug on macOS 26 + Xcode 26.4 SDK (codeberg.org/ziglang/zig/issues/31669).
build-release = { cmd = "bash -c 'BUILD_VERSION=$(date +%s); xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Release build -allowProvisioningUpdates ARCHS=arm64 CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO CURRENT_PROJECT_VERSION=\"$BUILD_VERSION\"'", depends-on = ["ensure-ghostty", "generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }
# Build Release only when sources are newer than the built binary (reuses existing GhosttyKit).
build-release-if-needed = { cmd = "bash -c 'BUILT=$(xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Release -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); BIN=\"$BUILT/Kytos.app/Contents/MacOS/Kytos\"; if [ -f \"$BIN\" ] && [ -z \"$(find Sources Frameworks project.yml Kytos.xcodeproj/project.pbxproj -newer \"$BIN\" 2>/dev/null | head -1)\" ]; then echo \"Release build up to date.\"; else BUILD_VERSION=$(date +%s); xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Release build -allowProvisioningUpdates ARCHS=arm64 CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO CURRENT_PROJECT_VERSION=\"$BUILD_VERSION\"; fi'", depends-on = ["ensure-ghostty", "generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }

# Assemble the .app bundle from the Release build output.
# xcodebuild already produces a full Kytos.app (with widget appex bundled
# via build phases in project.yml), so we just locate and copy it to the project root.
package = { cmd = "bash -c 'set -e; BUILT=$(xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Release -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); if [ ! -d \"$BUILT/Kytos.app\" ]; then echo \"ERROR: Release build not found at $BUILT/Kytos.app\"; exit 1; fi; rm -rf Kytos.app; cp -R \"$BUILT/Kytos.app\" Kytos.app; echo \"Packaged: Kytos.app\"'", depends-on = ["build-release"] }

# Create a DMG disk image with the .app and an Applications symlink.
dmg = { cmd = "bash -c 'set -e; VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed \"s/^v//\" || echo \"0.0.0\"); DMG=\"Kytos-${VERSION}.dmg\"; rm -f \"$DMG\"; TEMP=$(mktemp -d); cp -R Kytos.app \"$TEMP/\"; ln -s /Applications \"$TEMP/Applications\"; hdiutil create -volname Kytos -srcfolder \"$TEMP\" -ov -format UDZO \"$DMG\"; rm -rf \"$TEMP\"; echo \"Created: $DMG\"'", depends-on = ["package"] }

# Code sign the .app bundle. Set SIGN_IDENTITY env var for distribution signing;
# defaults to ad-hoc ("-") for local testing.
sign = { cmd = "bash -c 'set -e; IDENTITY=\"${SIGN_IDENTITY:--}\"; if [ \"$IDENTITY\" = \"-\" ]; then codesign --force --deep --sign - Kytos.app; echo \"Ad-hoc signed Kytos.app\"; else for BIN in $(find Kytos.app -type f -perm +111 | xargs file | grep Mach-O | cut -d: -f1); do codesign --force --options runtime --timestamp --sign \"$IDENTITY\" \"$BIN\"; done; codesign --force --options runtime --timestamp --sign \"$IDENTITY\" Kytos.app; echo \"Signed Kytos.app with: $IDENTITY\"; fi'", depends-on = ["package"] }

# Submit the DMG for Apple notarization.
# Requires: APPLE_ID, APPLE_PASSWORD (app-specific), APPLE_TEAM_ID env vars.
notarize = { cmd = "bash -c 'set -e; VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed \"s/^v//\" || echo \"0.0.0\"); DMG=\"Kytos-${VERSION}.dmg\"; if [ ! -f \"$DMG\" ]; then echo \"ERROR: $DMG not found. Run pixi run dmg first.\"; exit 1; fi; if [ -z \"$APPLE_ID\" ] || [ -z \"$APPLE_PASSWORD\" ] || [ -z \"$APPLE_TEAM_ID\" ]; then echo \"ERROR: Set APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID env vars.\"; exit 1; fi; echo \"Submitting $DMG for notarization...\"; xcrun notarytool submit \"$DMG\" --apple-id \"$APPLE_ID\" --password \"$APPLE_PASSWORD\" --team-id \"$APPLE_TEAM_ID\" --wait; echo \"Stapling...\"; xcrun stapler staple \"$DMG\"; echo \"Notarized: $DMG\"'" }

# Generate a changelog from git log since the last tag.
changelog = "bash -c 'TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo \"\"); if [ -z \"$TAG\" ]; then echo \"# Changelog\"; echo \"\"; git log --pretty=format:\"- %s (%h)\" --no-merges; else echo \"# Changelog since $TAG\"; echo \"\"; git log \"${TAG}..HEAD\" --pretty=format:\"- %s (%h)\" --no-merges; fi'"
