[workspace]
name = "kytos"
version = "0.1.0"
description = "A terminal emulator for macOS and iPadOS"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64"]

[tasks]
# Force-regenerate the Xcode project from project.yml (always runs XcodeGen).
generate = "swift run xcodegen generate --spec project.yml"

# Regenerate only when project.yml is newer than the generated project.pbxproj.
# Use `pixi run generate` to force-regenerate unconditionally.
generate-if-needed = "bash -c 'test Kytos.xcodeproj/project.pbxproj -nt project.yml || swift run xcodegen generate --spec project.yml'"

build = { cmd = "xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug build -allowProvisioningUpdates", depends-on = ["generate-if-needed"], env = { SDKROOT = "/Applications/Xcode.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk" } }
build-ios = { cmd = "xcodebuild -project Kytos.xcodeproj -scheme Kytos-iOS -configuration Debug -destination 'generic/platform=iOS' build -allowProvisioningUpdates", depends-on = ["generate-if-needed"] }
# Run unit tests (scrollback logic + ANSI encoding).
test = { cmd = "bash Scripts/run-tests.sh", depends-on = ["generate-if-needed"] }

# Launch the already-built app. Use `pixi run build` first if needed.
# Kills any old pane daemon to avoid protocol mismatches after rebuild.
run = "bash -c 'PID=$(cat /tmp/pane-$(id -u)/pane.pid 2>/dev/null) && [ -n \"$PID\" ] && kill \"$PID\" 2>/dev/null && echo \"Killed old pane daemon (PID $PID)\"; BUILT=$(xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); open -W \"$BUILT/Kytos.app\"'"

# Build + run in one step.
build-and-run = { cmd = "bash -c 'PID=$(cat /tmp/pane-$(id -u)/pane.pid 2>/dev/null) && [ -n \"$PID\" ] && kill \"$PID\" 2>/dev/null && echo \"Killed old pane daemon (PID $PID)\"; BUILT=$(xcodebuild -project Kytos.xcodeproj -scheme Kytos-macOS -configuration Debug -showBuildSettings 2>/dev/null | grep BUILT_PRODUCTS_DIR | sed \"s/.*= //\" | head -n 1); open -W \"$BUILT/Kytos.app\"'", depends-on = ["build"] }
